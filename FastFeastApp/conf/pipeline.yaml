      - agent_name
      - agent_email
      - agent_phone 
      - team_id
      - skill_level
      - hire_date
      - avg_handle_time_min
      - resolution_rate 
      - csat_score
      - is_active
      - created_at
      - updated_at
    required_fields:
      - agent_id
      - agent_name
      - agent_email
      - agent_phone
      - hire_date
    pii_fields:
      - agent_email
      - agent_phone

  teams:
    file_name: teams.csv
    file_type: static
    model_class: Team
    file_columns:
      - team_id
      - team_name
    required_fields:
      - team_id
      - team_name

  customers:
    file_name: customers.csv
    file_type: dynamic
    model_class: Customer
    file_columns:
