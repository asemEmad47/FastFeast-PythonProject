    required_fields:
      - ticket_id
      - order_id
      - customer_id
      - driver_id
      - restaurant_id
      - agent_id
      - reason_id
      - priority_id
      - channel_id
      - status
      - refund_amount
      - created_at
      - first_response_at
      - resolved_at
      - sla_first_due_at
      - sla_resolve_due_at

  ticket_events:
    file_name: ticket_events.json
    file_type: dynamic
    model_class: TicketEvent
    file_columns:
      - event_id
      - ticket_id
      - agent_id
      - event_ts
      - old_status
      - new_status
      - notes
    required_fields:
      - event_id
      - ticket_id
      - new_status


# ============================================================
# TABLES (DWH LAYER)
# ============================================================

tables:

  AgentsDim:
    source: [agents, teams]
    joins:
      - left: agents.team_id
        right: teams.team_id
        type: left
    target_table: AgentsDim
    table_type: dimension
    repository: AgentRepository

    required_fields:
      - agent_id
      - agent_name
      - agent_email
      - agent_phone

    primary_key: agent_id
    keep_columns:
      - agent_id
      - agent_name
      - agent_email
      - agent_phone
      - team_name
      - skill_level
      - hire_date
      - avg_handle_time_min
      # - resolution_rate
      # - csat_score
      - is_active
      - created_at
      - updated_at

  CustomersDim:
    source: [customers, segments]
    joins:
      - left: customers.segment_id
        right: segments.segment_id
        type: left
    target_table: CustomersDim
    table_type: dimension
    repository: CustomerRepository
    primary_key: customer_id
    foreign_keys:
      region_id: RegionsDim.region_id
    keep_columns:
      - customer_id
      - full_name
      - email
      - phone
      - region_id
      - segment_name
      - priority_support
      - discount_pct
      - created_at
      - updated_at

    required_fields:
      - customer_id
      - full_name
      - email
      - phone

  RegionsDim:
    source: [regions]
    target_table: RegionsDim
    table_type: dimension
    repository: RegionRepository
    primary_key: region_id
    foreign_keys:
      city_id: CitiesDim.city_id
    keep_columns:
      - region_id
      - region_name
      - city_id
      - delivery_base_fee
    required_fields:
      - region_id
      - region_name
      - city_id
      - delivery_base_fee

  RestaurantsDim:
    source: [restaurants, categories]
    target_table: RestaurantsDim
    joins:
      - left: restaurants.category_id
        right: categories.category_id
        type: left
    table_type: dimension
    repository: RestaurantRepository

    primary_key: restaurant_id

    required_fields:
      - restaurant_id
      - restaurant_name
      - prep_time_avg_min
      - is_active

    foreign_keys:
      region_id: RegionsDim.region_id

    keep_columns:
      - restaurant_id
      - restaurant_name
      - region_id
      - category_name
      - price_tier
      #- rating_avg
      - prep_time_avg_min
      - is_active
      - created_at
      - updated_at


  ChannelsDim:
    source: [channels]
    target_table: ChannelsDim
    table_type: dimension
    repository: ChannelRepository

    primary_key: channel_id

    required_fields:
      - channel_id
      - channel_name

    keep_columns:
      - channel_id
      - channel_name


  CitiesDim:
    source: [cities]
    target_table: CitiesDim
    table_type: dimension
    repository: CitiesRepository
    primary_key: city_id

    required_fields:
      - city_id
      - city_name
      - country
      - timezone

    keep_columns:
      - city_id
      - city_name
      - country
      - timezone


  DateDim:
    generated: true   

    target_table: DateDim
    table_type: dimension
    repository: DateRepository

    primary_key: date_id

    keep_columns:
      - date_id 
      - full_date 
      - day
      - month
      - quarter
      - year
      - day_of_week
      - is_weekend


  DriversDim:
    source: [drivers]

    target_table: DriversDim
    table_type: dimension
    repository: DriversRepository

    primary_key: driver_id

    required_fields:
      - driver_id
      - driver_name
      - driver_phone
      - hire_date
      - is_active

    foreign_keys:
      region_id: RegionsDim.region_id

    keep_columns:
      - driver_id
      - driver_name
      - driver_phone
      - national_id
      - region_id
      - shift
      - vehicle_type
      - hire_date
      - rating_avg
      - on_time_rate
      - cancel_rate
      - completed_deliveries
      - is_active
      - created_at
      - updated_at


  ReasonsDim:
    source: [reasons,reason_categories]
    joins:
      - left: reasons.reason_category_id
        right: reason_categories.reason_category_id
        type: left

    target_table: ReasonsDim
    table_type: dimension
    repository: ReasonRepository

    primary_key: reason_id

    required_fields:
      - reason_id
      - reason_name
      - severity_level
      - typical_refund_pct

    keep_columns:
      - reason_id
      - reason_name
      - category_name   
      - severity_level
      - typical_refund_pct  

  FactTickets:
    source: [tickets]
    joins:
      - left: tickets.order_id
        right: orders.order_id
        type: left

    event_sources:
    - ticket_events

    dimension_sources:
      - dim: CustomersDim
        fk: customer_id
        type: left
      - dim: AgentsDim
        fk: agent_id
        type: left
      - dim: DriversDim
        fk: driver_id
        type: left
      - dim: RestaurantsDim
        fk: restaurant_id
        type: left
      - dim: RegionsDim
        fk: region_id
        type: left
      - dim: ReasonsDim
        fk: reason_id
        type: left
      - dim: ChannelsDim
        fk: channel_id
        type: left
      - dim: DateDim
        fk: [date_key_ticket_created , date_key_first_response , date_key_resolved ]
        type: left

    target_table: FactTickets
    table_type: fact
    repository: FactTicketsRepository
    primary_key: ticket_id

    keep_columns:
      - ticket_id
      - order_id
      - customer_id
      - agent_id
      - driver_id
      - restaurant_id
      - region_id
      - reason_id
      - priority_id
      - channel_id
      - refund_amount
      - created_at
      - first_response_at
      - resolved_at
      - reopen_count
      - resolution_time_min
      - first_response_time_min
      - sla_first_response_breached
      - sla_resolution_breached
      - date_key_ticket_created
      - date_key_first_response
      - date_key_resolved
      - order_amount
      - delivery_fee 
      - discount_amount 
      - total_amount 
      - revenue_impact

    aggregated_columns:
      - name: resolution_time_min
        expression: "resolved_at - created_at"
      - name: first_response_time_min
        expression: "first_response_at - created_at"
      - name: sla_first_response_breached
        expression: "first_response_time_min > sla_first_due_at"
      - name: sla_resolution_breached
        expression: "resolution_time_min > sla_resolve_due_at"
      - name: reopen_count
        expression: "select ticket_id, count(new_status) from ticket_events where new_status = 'open' group by ticket_id "
      - name: revenue_impact
        expression: "refund_amount + discount_amount"