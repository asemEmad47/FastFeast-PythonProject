    file_columns:
      - segment_id
      - segment_name
      - priority_support
      - discount_pct
    required_fields:
      - segment_id
      - segment_name
      - priority_support
      - discount_pct

  cities:
    file_name: cities.json
    file_type: static
    model_class: City
    file_columns:
      - city_id
      - city_name
      - country
      - timezone
    required_fields:
      - city_id
      - city_name
      - country
      - timezone

  regions:
    file_name: regions.csv
    file_type: static
    model_class: Region
    file_columns:
      - region_id
      - region_name
      - city_id
      - delivery_base_fee
    required_fields:
      - region_id
      - region_name
      - city_id
      - delivery_base_fee

  restaurants:
    file_name: restaurants.json
    file_type: dynamic
    model_class: Restaurant
    file_columns:
      - restaurant_id
      - restaurant_name
      - region_id
      - category_id
      - price_tier
      - rating_avg
      - prep_time_avg_min
      - is_active
      - created_at
      - updated_at
    required_fields:
      - restaurant_id
      - restaurant_name
      - is_active

  categories:
    file_name: categories.csv
    file_type: static
    model_class: Category
    file_columns:
      - category_id
      - category_name
    required_fields:
      - category_id
      - category_name

  channels:
    file_name: channels.csv
    file_type: static
    model_class: Channel
    file_columns:
      - channel_id
      - channel_name
    required_fields:
      - channel_id
      - channel_name

  drivers:
    file_name: drivers.csv
    file_type: dynamic
    model_class: Driver
    file_columns:
      - driver_id
      - driver_name
      - driver_phone
      - national_id
      - region_id
      - shift
      - vehicle_type
      - hire_date
      - rating_avg
      - on_time_rate
      - cancel_rate
      - completed_deliveries
      - is_active
      - created_at
      - updated_at
    required_fields:
      - driver_id
      - driver_name
      - driver_phone
      - hire_date
      - is_active

  priorities:
    file_name: priorities.csv
    file_type: static
    model_class: Priority
    file_columns:
      - priority_id
      - priority_code
      - priority_name
      - sla_first_response_min
      - sla_resolution_min
    required_fields:
      - priority_id
      - priority_code
      - priority_name
      - sla_first_response_min
      - sla_resolution_min

  reasons:
    file_name: reasons.csv
    file_type: static
    model_class: Reason
    file_columns:
      - reason_id
      - reason_name
      - reason_category_id
      - severity_level
      - typical_refund_pct
    required_fields:
      - reason_id
      - reason_name
      - reason_category_id
      - severity_level
      - typical_refund_pct

  reason_categories:
    file_name: reason_categories.csv
    file_type: static
    model_class: ReasonCategory
    file_columns:
      - reason_category_id
      - category_name
    required_fields:
