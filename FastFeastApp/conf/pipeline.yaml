## ============================================================
##  FastFeast ETL  –  Pipeline Configuration  (v3)
##
##  CORE DESIGN PRINCIPLE — "Dim provides, Fact consumes"
##
##  DIMENSION block owns:
##    file_name    → where the raw source data lives
##    primary_key  → the JOIN key exposed to facts (right_on)
##
##  FACT block owns:
##    dimension_sources → which dims it needs and on which FK (left_on)
##
##  HOW JOIN RESOLVES at runtime:
##    1. Read fact.dimension_sources  → list of { dim_key, fact_fk, join_type }
##    2. Look up tables[dim_key]      → read dim.file_name + dim.primary_key
##    3. Get dim_df from DataRegistry → registry.get_df(dim.file_name)
##    4. joined = fact_df.join(dim_df, left_on=fact_fk,
##                             right_on=dim.primary_key, how=join_type)
##    5. Store result as fact.output_alias in DataRegistry
##
##  RESULT:
##    - Zero duplication: each join key is declared exactly once (on the dim)
##    - Adding a new fact → only add dimension_sources to the new fact block
##    - Adding a new dim  → only add a new dim block
##    - Join class needs zero hardcoding — fully metadata-driven
## ============================================================


# ─────────────────────────────────────────────────────────────
# WORKFLOW
#   Declares which source FILES to load in this pipeline run.
#   WorkFlow.files is populated from here by VariablesInitializer.
#   Every file listed here must have a matching block in tables[].
# ─────────────────────────────────────────────────────────────
workflow:
  files:
    - customers.json    # → tables.customers  (dimension)
    - tickets.csv       # → tables.tickets    (fact)


# ─────────────────────────────────────────────────────────────
# TABLES
# ─────────────────────────────────────────────────────────────
tables:

  # ════════════════════════════════════════════════════════
  # DIMENSION: Customer
  #
  #  "I am the right side of any join that needs customer data.
  #   My source file is customers.json.
  #   My join key is customer_id."
  # ════════════════════════════════════════════════════════
  customers:
    file_name:    customers.json      # source file — loaded by ReadFromSource
    target_table: dim_customer        # DWH target written by LoadToTarget
    table_type:   dimension
    model_class:  Customer            # DataRegistry → get_model_for_file()
    repository:   CustomerRepository  # DataRegistry → get_repository_for_file()

    # ── JOIN PROVIDER ─────────────────────────────────────
    # Any fact that lists dim_key: customers will use THIS key
    # as the right_on column when joining against this dimension.
    primary_key:   customer_id
    surrogate_key: customer_sk        # generated by SCDComponent (type-2)

    # ── SCD ───────────────────────────────────────────────
    dimension:
      mode:     scd
      scd_type: 2

    tracked_columns:          # SCDComponent watches these for row versioning
      - full_name
      - email
      - phone
      - region_id

    # ── VALIDATION ────────────────────────────────────────
    required_fields:          # ValidatorComponent enforces presence
      - customer_id
      - full_name
      - email
      - phone
      - region_id

    foreign_keys:             # OrphansHandler validates outbound FKs
      region_id: dim_region.region_id

    # ── TRANSFORMATION ────────────────────────────────────
    keep_columns:             # Transformer drops everything NOT in this list
      - customer_id
      - full_name
      - email
      - phone
      - region_id
      - segment_id
      - signup_date
      - gender

    pii_fields:               # PIIMask hashes these BEFORE any join
      - email
      - phone


  # ════════════════════════════════════════════════════════
  # FACT: Ticket
  #
  #  "I am the left side of every join I declare below.
  #   I need the customers dimension joined into me on customer_id."
  # ════════════════════════════════════════════════════════
  tickets:
    file_name:    tickets.csv
    target_table: fact_ticket
    table_type:   fact
    model_class:  Ticket
    repository:   TicketRepository

    primary_key: ticket_id

    # ── VALIDATION ────────────────────────────────────────
    required_fields:
      - ticket_id
      - customer_id
      - priority_id
      - created_at
      - status

    foreign_keys:             # OrphansHandler validates these BEFORE join
      customer_id: dim_customer.customer_id
      priority_id: dim_priority.priority_id

    # ── JOIN CONSUMER ─────────────────────────────────────
    # "I (the fact) declare which dimensions I need joined into me."
    #
    # dim_key   → key in tables[] section
    #               Join reads tables[dim_key].file_name  → source of right_df
    #               Join reads tables[dim_key].primary_key → right_on column
    # fact_fk   → FK column on THIS fact dataframe (left_on)
    # join_type → left / inner / right
    #
    # Runtime resolution (fully automatic, zero hardcoding):
    #   dim_conf  = registry.get_table_conf("customers")
    #   right_df  = registry.get_df(dim_conf.file_name)   # "customers.json"
    #   right_on  = dim_conf.primary_key                   # "customer_id"
    #   result    = tickets_df.join(right_df,
    #                 left_on  = "customer_id",            # fact_fk
    #                 right_on = "customer_id",            # dim primary_key
    #                 how      = "left")
    dimension_sources:
      - dim_key:   customers          # → tables.customers → customers.json
        fact_fk:   customer_id        # FK column on the fact side (left_on)
        join_type: left               # keep all tickets even without a customer

    # Result of all joins stored in DataRegistry under this alias
    output_alias: tickets_enriched

    # ── TRANSFORMATION ────────────────────────────────────
    keep_columns:
      - ticket_id
      - customer_id
      - priority_id
      - reason_id
      - agent_id
      - channel_id
      - status
      - refund_amount
      - created_at
      - first_response_at
      - resolved_at

    aggregated_columns:       # Transformer.calculate_aggregated_columns()
      - name:       resolution_time_min
        expression: "resolved_at - first_response_at"
      - name:       sla_first_breached
        expression: "first_response_at > sla_first_due_at"
      - name:       sla_resolve_breached
        expression: "resolved_at > sla_resolve_due_at"
